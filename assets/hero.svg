    <text x="600" y="167" text-anchor="middle" font-family="'Segoe UI',Verdana,sans-serif" font-size="19" letter-spacing="11" fill="#ffffff" opacity="0.92">FUTBOL CLUB BARCELONA</text>
    <rect y="208" width="1200" height="22" fill="#FCDD09"/>
