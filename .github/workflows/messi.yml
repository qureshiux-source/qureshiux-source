name: Messi Contribution Animation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch real contribution graph and generate animation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f login='${{ github.repository_owner }}' -f query='query($login:String!){ user(login:$login){ contributionsCollection{ contributionCalendar{ totalContributions weeks{ firstDay contributionDays{ date weekday contributionCount contributionLevel } } } } } }' > contrib.json
          node .github/scripts/gen-messi.js

      - name: Push generated SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
