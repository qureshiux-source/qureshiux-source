<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 24" width="820" height="24" role="img" aria-label="divider">
  <defs>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#004D98"/><stop offset="0.5" stop-color="#A50044"/><stop offset="1" stop-color="#EDBB00"/>
    </linearGradient>
    <style>
      .roll { animation: roll 4.5s linear infinite; }
      .bsp  { animation: bsp 0.5s linear infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes roll { from { transform: translateX(-14px); } to { transform: translateX(834px); } }
      @keyframes bsp  { to { transform: rotate(360deg); } }
    </style>
  </defs>
  <rect x="0" y="10.5" width="820" height="3" rx="1.5" fill="url(#dl)" opacity="0.9"/>
  <g class="roll"><g transform="translate(0,12)"><g class="bsp">
    <circle r="6.5" fill="#ffffff" stroke="#111" stroke-width="0.8"/>
    <polygon points="0,-3.4 3.2,-1 2,2.8 -2,2.8 -3.2,-1" fill="#111"/>
    <circle cx="0" cy="-4.6" r="1" fill="#111"/><circle cx="4.4" cy="1.3" r="1" fill="#111"/><circle cx="-4.4" cy="1.3" r="1" fill="#111"/>
  </g></g></g>
</svg>
