<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 230" width="1200" height="230" role="img" aria-label="Més que un club — FC Barcelona">
  <defs>
    <pattern id="bg" width="120" height="230" patternUnits="userSpaceOnUse">
      <rect width="60" height="230" fill="#004D98"/>
      <rect x="60" width="60" height="230" fill="#A50044"/>
    </pattern>
    <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.18"/>
